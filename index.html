<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>FORGE — Intelligent Training System</title>
  <meta name="description" content="AI-powered fitness tracking and dynamic coaching" />
  <meta name="theme-color" content="#0e0f11" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FORGE" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0e0f11; color: #e8eaf0; font-family: 'Inter', system-ui, sans-serif; }
    #root { min-height: 100vh; }
    #splash { position: fixed; inset: 0; background: #0e0f11; display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 9999; transition: opacity 0.4s; }
    #splash h1 { font-size: 32px; font-weight: 700; letter-spacing: 8px; color: #e8eaf0; }
    #splash p { font-size: 10px; letter-spacing: 4px; color: #6b7280; margin-top: 6px; }
    #splash.hidden { opacity: 0; pointer-events: none; }
  </style>
</head>
<body>
  <div id="splash">
    <h1>FORGE</h1>
    <p>INTELLIGENT TRAINING SYSTEM</p>
  </div>
  <div id="root"></div>

  <script type="module">
    import { jsx as _jsx } from 'https://esm.sh/react@18/jsx-runtime';
    import { createRoot } from 'https://esm.sh/react-dom@18/client';

    // Hide splash once React mounts
    window.addEventListener('load', () => {
      setTimeout(() => document.getElementById('splash')?.classList.add('hidden'), 600);
    });

    // Register service worker
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(console.error);
    }

    // Dynamically import the app bundle
    import('/app.js').then(mod => {
      const root = createRoot(document.getElementById('root'));
      root.render(_jsx(mod.default, {}));
    });
  </script>
</body>
</html>
